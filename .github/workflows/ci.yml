name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: univerlab

      # Sibling repos — ONLY their docs/ folder (sparse checkout, cone mode).
      - uses: actions/checkout@v4
        with: { repository: UniverLab/harness-canopy, path: harness-canopy, sparse-checkout: docs }
      - uses: actions/checkout@v4
        with: { repository: UniverLab/texforge, path: texforge, sparse-checkout: docs }
      - uses: actions/checkout@v4
        with: { repository: UniverLab/gitkit, path: gitkit, sparse-checkout: docs }
      - uses: actions/checkout@v4
        with: { repository: UniverLab/ghscaff, path: ghscaff, sparse-checkout: docs }
      - uses: actions/checkout@v4
        with: { repository: UniverLab/cadspec, path: cadspec, sparse-checkout: docs }
      - uses: actions/checkout@v4
        with: { repository: UniverLab/demo-stage, path: demo-stage, sparse-checkout: docs }

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: univerlab/package-lock.json

      - name: Install
        working-directory: univerlab
        run: npm ci

      - name: Build
        working-directory: univerlab
        run: npm run build

      - name: Test
        working-directory: univerlab
        run: npm run test:coverage

      - name: Check i18n
        working-directory: univerlab
        run: npm run check:i18n
