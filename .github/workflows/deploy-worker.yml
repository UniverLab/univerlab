name: Deploy get worker

# Deploys workers/get (get.univerlab.org) to Cloudflare, but only when that
# folder changes. The Astro site itself is built/deployed by Cloudflare Pages'
# Git integration, not here.
on:
  push:
    branches: [main]
    paths:
      - 'workers/get/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/get
