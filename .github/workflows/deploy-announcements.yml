name: Deploy announcements worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/announcements/**'
      - '.github/workflows/deploy-announcements.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: workers/announcements/package-lock.json

      - name: Install dependencies
        working-directory: workers/announcements
        run: npm ci

      - name: Typecheck
        working-directory: workers/announcements
        run: npm run typecheck

      # No wranglerVersion pin: the action reuses the wrangler from package-lock,
      # so CI and local deploy the same version.
      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/announcements
          command: deploy
